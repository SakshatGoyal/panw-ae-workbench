<!--
  Load the design system's sans-serif (Inter) so component styles that resolve
  var(--ds-type-font-family-sans) render with the intended typeface in Storybook.
  No other typefaces are loaded — Lato and other foreign fonts must never appear.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --ds-type-font-family-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--ds-type-font-family-sans);
  }
</style>
