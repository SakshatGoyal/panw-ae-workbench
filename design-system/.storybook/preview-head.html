<!--
  Load TT Hoves (self-hosted woff2) as the design system's sans-serif so component
  styles that resolve var(--ds-type-font-family-sans) render with the intended
  typeface in Storybook. Served from packages/type/fonts/tt-hoves/ via staticDirs.
  Three static files for weights 300 / 400 / 600 (no variable font available).
-->
<style>
  @font-face {
    font-family: 'TT Hoves';
    src: url('/tt-hoves/TTHoves-Light.woff2') format('woff2');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'TT Hoves';
    src: url('/tt-hoves/TTHoves-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'TT Hoves';
    src: url('/tt-hoves/TTHoves-DemiBold.woff2') format('woff2');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --ds-type-font-family-sans: 'TT Hoves', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--ds-type-font-family-sans);
  }
</style>
