<!--
  Load the design system's sans-serif (Lato) so component styles that resolve
  var(--ds-type-font-family-sans) render with the intended typeface in Storybook.
  Lato is the only sans loaded — no Inter, no other foreign fonts.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --ds-type-font-family-sans: Lato, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    font-family: var(--ds-type-font-family-sans);
  }
</style>
