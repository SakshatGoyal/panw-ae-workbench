<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elevation Tokens</title>
    <link rel="stylesheet" href="../packages/styles/css/styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f5f4;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a1a;
      }

      .page {
        padding: 96px 120px;
      }

      .back {
        display: inline-block;
        margin-bottom: 56px;
        font-size: 13px;
        color: #555;
        text-decoration: none;
      }

      .back:hover {
        color: #1a1a1a;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 200px);
        gap: 96px;
      }

      .card {
        width: 200px;
        height: 200px;
        background: #ffffff;
        border-radius: var(--ds-radius-standard);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .card__name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .card__token {
        font-size: 11px;
        color: #888;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .card--tile-on-tile { box-shadow: var(--ds-shadow-tile-on-tile); }
      .card--tiles      { box-shadow: var(--ds-shadow-tiles); }
      .card--shell      { box-shadow: var(--ds-shadow-shell); }
      .card--flyout     { box-shadow: var(--ds-shadow-flyout); }
      .card--persistent { box-shadow: var(--ds-shadow-persistent); }
      .card--modals     { box-shadow: var(--ds-shadow-modals); }

      .grid--oai {
        display: grid;
        grid-template-columns: repeat(4, 200px);
        gap: 96px;
        margin-top: 96px;
      }

      .card--oai-100 { box-shadow: 0 1px 2px -1px rgb(0 0 0 / 8%); }
      .card--oai-200 { box-shadow: 0 2px 4px -1px rgb(0 0 0 / 8%); }
      .card--oai-300 { box-shadow: 0 4px 8px -2px rgb(0 0 0 / 10%); }
      .card--oai-400 { box-shadow: 0 8px 16px -4px rgb(0 0 0 / 12%); }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back" href="./index.html">← Token demo</a>
      <div class="grid">
        <div class="card card--tile-on-tile">
          <div class="card__name">tile-on-tile</div>
          <div class="card__token">--ds-shadow-tile-on-tile</div>
        </div>
        <div class="card card--tiles">
          <div class="card__name">tiles</div>
          <div class="card__token">--ds-shadow-tiles</div>
        </div>
        <div class="card card--shell">
          <div class="card__name">shell</div>
          <div class="card__token">--ds-shadow-shell</div>
        </div>
        <div class="card card--flyout">
          <div class="card__name">flyout</div>
          <div class="card__token">--ds-shadow-flyout</div>
        </div>
        <div class="card card--persistent">
          <div class="card__name">persistent</div>
          <div class="card__token">--ds-shadow-persistent</div>
        </div>
        <div class="card card--modals">
          <div class="card__name">modals</div>
          <div class="card__token">--ds-shadow-modals</div>
        </div>
      </div>

      <div class="grid grid--oai">
        <div class="card card--oai-100">
          <div class="card__name">shadow-100</div>
          <div class="card__token">--shadow-100</div>
        </div>
        <div class="card card--oai-200">
          <div class="card__name">shadow-200</div>
          <div class="card__token">--shadow-200</div>
        </div>
        <div class="card card--oai-300">
          <div class="card__name">shadow-300</div>
          <div class="card__token">--shadow-300</div>
        </div>
        <div class="card card--oai-400">
          <div class="card__name">shadow-400</div>
          <div class="card__token">--shadow-400</div>
        </div>
      </div>
    </main>
  </body>
</html>
